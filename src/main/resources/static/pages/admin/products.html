<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Bookshop Admin</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/admin-sidebar.css">
    <link rel="stylesheet" href="../../css/products.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">Bookshop Admin<span>Management System</span></div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="products.html" class="active">📦 Products</a></li>
                <li><a href="customers.html">👥 Customers</a></li>
                <li><a href="orders.html">📋 Orders</a></li>
                <li><a href="payments.html">💳 Payments</a></li>
                <li><a href="feedback.html">⭐ Feedback</a></li>
                <li><a href="../user/home.html">🏪 View Store</a></li>
            </ul>
        </aside>

        <main class="admin-main">
            <div class="admin-header"><h1>Product Management</h1></div>

            <div class="edit-panel visible" id="productForm">
                <h3 id="formTitle">Add Product</h3>
                <input type="hidden" id="productId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="productName">
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="price" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="stockQuantity">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="categoryId"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description">
                </div>
                <div class="form-group">
                    <label>Image Filename</label>
                    <input type="text" id="imageUrl" placeholder="e.g. spring-book.jpg">
                </div>
                <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
                <button class="btn btn-outline" onclick="clearForm()" style="margin-left:8px">Clear</button>
            </div>

            <table class="admin-table" id="productTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </main>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/products.js"></script>
</body>
</html>
