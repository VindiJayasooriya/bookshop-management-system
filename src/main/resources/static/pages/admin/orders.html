<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Bookshop Admin</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/admin-sidebar.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">Bookshop Admin<span>Management System</span></div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="products.html">📦 Products</a></li>
                <li><a href="customers.html">👥 Customers</a></li>
                <li><a href="orders.html" class="active">📋 Orders</a></li>
                <li><a href="payments.html">💳 Payments</a></li>
                <li><a href="feedback.html">⭐ Feedback</a></li>
                <li><a href="../user/home.html">🏪 View Store</a></li>
            </ul>
        </aside>

        <main class="admin-main">
            <div class="admin-header"><h1>Order Management</h1></div>

            <div class="edit-panel" id="editPanel">
                <h3>Update Order Status</h3>
                <input type="hidden" id="orderId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Order ID</label>
                        <input type="text" id="orderIdDisplay" readonly>
                    </div>
                    <div class="form-group">
                        <label>Customer</label>
                        <input type="text" id="customerName" readonly>
                    </div>
                    <div class="form-group">
                        <label>Total</label>
                        <input type="text" id="totalAmount" readonly>
                    </div>
                    <div class="form-group">
                        <label>Order Status</label>
                        <select id="orderStatus">
                            <option value="PENDING">PENDING</option>
                            <option value="COMPLETED">COMPLETED</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="updateOrder()">Update Status</button>
                <button class="btn btn-outline" onclick="closeEditPanel()" style="margin-left:8px">Cancel</button>
            </div>

            <table class="admin-table" id="orderTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Discount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </main>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/orders.js"></script>
</body>
</html>
