<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - JAYA Bookshop</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/payment.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand">JAYA <span>Bookshop</span></a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Payment</h1>

        <div class="payment-layout">
            <div class="payment-methods card">
                <h3>Select Payment Method</h3>

                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="CASH" checked>
                    <div class="option-content">
                        <span class="option-icon">💵</span>
                        <div>
                            <strong>Cash on Delivery</strong>
                            <p>Pay when your order arrives</p>
                        </div>
                    </div>
                </label>

                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="ONLINE">
                    <div class="option-content">
                        <span class="option-icon">💳</span>
                        <div>
                            <strong>Online Payment</strong>
                            <p>Pay securely with your card</p>
                        </div>
                    </div>
                </label>

                <div class="card-form" id="cardForm" style="display:none">
                    <h4>Card Details</h4>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                    </div>
                    <div class="form-group">
                        <label>Card Holder Name</label>
                        <input type="text" id="cardHolder" placeholder="Name on card">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" id="cvv" placeholder="123" maxlength="4">
                        </div>
                    </div>
                </div>
            </div>

            <div class="payment-summary card">
                <h3>Payment Summary</h3>
                <div class="detail-row">
                    <span>Order ID</span>
                    <span id="orderIdDisplay">-</span>
                </div>
                <div class="detail-row">
                    <span>Amount to Pay</span>
                    <span id="paymentAmount" class="amount">Rs. 0.00</span>
                </div>
                <button class="btn btn-primary btn-block" onclick="processPayment()">Pay Now</button>
            </div>
        </div>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/payment.js"></script>
</body>
</html>
