<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - JAYA Bookshop</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/feedback-user.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand">JAYA <span>Bookshop</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="customer-orders.html">My Orders</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><span class="member-greeting" id="memberName"></span></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="register.html" id="registerLink">Register</a></li>
                <li><span class="logout-link" id="logoutBtn">Logout</span></li>
                <li><a href="cart.html" class="cart-link">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Submit Feedback</h1>

        <div class="feedback-form card">
            <p class="feedback-info">Share your experience with us. Your feedback helps us improve!</p>

            <div class="form-group">
                <label>Your Email</label>
                <input type="email" id="email" placeholder="Enter your registered email">
            </div>

            <div class="form-group">
                <label>Product</label>
                <select id="productId">
                    <option value="">Select a product</option>
                </select>
            </div>

            <div class="form-group">
                <label>Rating</label>
                <div class="rating-stars" id="ratingStars">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <input type="hidden" id="rating" value="0">
            </div>

            <div class="form-group">
                <label>Comment</label>
                <textarea id="comment" rows="4" placeholder="Tell us about your experience..."></textarea>
            </div>

            <button class="btn btn-primary btn-block" onclick="submitFeedback()">Submit Feedback</button>
        </div>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/feedback-user.js"></script>
</body>
</html>
