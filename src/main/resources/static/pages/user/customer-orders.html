<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - JAYA Bookshop</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/customer-orders.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand">JAYA <span>Bookshop</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="customer-orders.html">My Orders</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><span class="member-greeting" id="memberName"></span></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="register.html" id="registerLink">Register</a></li>
                <li><span class="logout-link" id="logoutBtn">Logout</span></li>
                <li><a href="cart.html" class="cart-link">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">My Orders</h1>

        <div class="lookup-form card">
            <div class="form-group">
                <label>Enter your email to view orders</label>
                <div class="lookup-row">
                    <input type="email" id="email" placeholder="your@email.com">
                    <button class="btn btn-primary" onclick="loadOrders()">View Orders</button>
                </div>
            </div>
        </div>

        <div id="ordersList"></div>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/customer-orders.js"></script>
</body>
</html>
