<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - JAYA Bookshop</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/cart.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand">JAYA <span>Bookshop</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="customer-orders.html">My Orders</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><span class="member-greeting" id="memberName"></span></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="register.html" id="registerLink">Register</a></li>
                <li><span class="logout-link" id="logoutBtn">Logout</span></li>
                <li><a href="cart.html" class="cart-link">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Shopping Cart</h1>

        <div class="cart-layout">
            <div class="cart-items" id="cartContainer"></div>

            <div class="cart-summary card">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalAmount">Rs. 0.00</span>
                </div>
                <div class="summary-row discount-row" id="discountRow" style="display:none">
                    <span>Member Discount (<span id="discountPct">5</span>%)</span>
                    <span id="discountAmount">- Rs. 0.00</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span id="totalPrice">Rs. 0.00</span>
                </div>
                <a href="checkout.html" class="btn btn-primary btn-block" id="checkoutBtn">Proceed to Checkout</a>
                <a href="shop.html" class="btn btn-outline btn-block">Continue Shopping</a>
            </div>
        </div>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/cart.js"></script>
</body>
</html>
