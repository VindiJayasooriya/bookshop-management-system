<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JAYA Bookshop</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand">JAYA <span>Bookshop</span></a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card card">
            <h2>Member Login</h2>
            <p class="auth-subtitle">Login to enjoy 5% discount on every order</p>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button class="btn btn-primary btn-block" onclick="login()">Login</button>

            <p class="auth-footer">
                Not a member? <a href="register.html">Register here</a> and get 5% off!
            </p>
        </div>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/login.js"></script>
</body>
</html>
