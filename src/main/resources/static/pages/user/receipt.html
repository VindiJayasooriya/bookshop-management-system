<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt - JAYA Bookshop</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/receipt.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand">JAYA <span>Bookshop</span></a>
        </div>
    </nav>

    <div class="container">
        <div class="receipt-card card" id="receiptContent">

                <a href="customer-orders.html" class="btn btn-outline">View My Orders</a>
                <a href="feedback.html" class="btn btn-secondary">Leave Feedback</a>
            </div>
        </div>
    </div>

    <script src="../../js/toast.js"></script>
    <script src="../../js/validation.js"></script>
    <script src="../../js/common.js"></script>
